name: Run Bash Commands

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  run-bash:
    runs-on: ubuntu-latest  # Use the latest Ubuntu environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Bash Commands
        run: |
          git checkout main
          git branch file
          git push origin file
