name: Run Bash Commands

on:
  workflow_dispatch:

jobs:
  run-bash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Git configuration
        run: |
          git config --global user.name "darekasanga"
          git config --global user.email "164146822+darekasanga@users.noreply.github.com"

      - name: Authenticate with GitHub Token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/darekasanga/line-ai-chatbot.git

      - name: Run Bash Commands
        run: |
          git checkout main
          git branch file
          git push origin file
